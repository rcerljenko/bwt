name: CMake CI

on:
 pull_request:
  types: [opened, synchronize, reopened, ready_for_review]

concurrency:
 group: ${{ github.ref }}
 cancel-in-progress: true

env:
 CLANG_VERSION: 22

jobs:
 unix:
  if: github.event.pull_request.draft == false

  strategy:
   fail-fast: false
   matrix:
    os: [ubuntu-latest, macos-latest]
    generator: ['']
    compiler: [gcc, clang]
    linker: [DEFAULT]
    include:
     - os: ubuntu-latest
       compiler: icx
       cpack: true
     - os: ubuntu-latest
       compiler: musl-gcc
       linker: MOLD
       static: true
     - os: macos-latest
       generator: Xcode
     - os: macos-latest
       compiler: gcc
       compilerAlias: gcc-15
     - os: ubuntu-latest
       compiler: gcc
       linker: LLD
     - os: ubuntu-latest
       compiler: clang
       linker: LLD

  runs-on: ${{ matrix.os }}

  name: ${{ matrix.os }} - ${{ matrix.compiler || matrix.generator }} - ${{ matrix.static && 'STATIC' || 'SHARED' }} ${{ matrix.linker && format('- {0}', matrix.linker) || '' }} ${{ matrix.cpack && '- CPack' || '' }}

  steps:
   - name: Pulling project
     uses: actions/checkout@v6

   - name: Add Intel APT repository
     if: ${{ matrix.compiler == 'icx' }}
     working-directory: ${{ runner.temp }}
     run: |
      wget https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
      sudo apt-key add GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
      rm GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB
      sudo add-apt-repository -y "deb https://apt.repos.intel.com/oneapi all main"
      sudo apt-get update -q

   - name: Install Intel oneAPI compiler
     if: ${{ matrix.compiler == 'icx' }}
     run: sudo apt-get install -y -q intel-oneapi-compiler-dpcpp-cpp

   - name: Setup Intel oneAPI environment
     if: ${{ matrix.compiler == 'icx' }}
     run: |
      source /opt/intel/oneapi/setvars.sh
      printenv >> $GITHUB_ENV

   - name: Install musl libc
     if: ${{ matrix.compiler == 'musl-gcc' }}
     run: |
      sudo apt-get update -q
      sudo apt-get install -y -q musl-tools

   - name: Install latest Clang compiler
     if: ${{ matrix.compiler == 'clang' && runner.os == 'Linux' }}
     uses: egor-tensin/setup-clang@v2
     with:
      version: ${{ env.CLANG_VERSION }}

   - name: Install LLD linker
     if: ${{ matrix.linker == 'LLD' && runner.os == 'Linux' }}
     run: |
      sudo apt-get update -q
      sudo apt-get install -y -q lld

   - name: Install mold linker
     if: ${{ matrix.linker == 'MOLD' }}
     uses: rui314/setup-mold@v1

   - name: Setup latest Xcode version
     if: ${{ matrix.generator == 'Xcode' }}
     uses: maxim-lobanov/setup-xcode@v1

   - name: Setup CMake
     id: cmake
     uses: threeal/cmake-action@v2
     with:
      source-dir: src
      generator: ${{ matrix.generator }}
      c-compiler: ${{ matrix.compilerAlias || matrix.compiler }}
      build-args: --config Release ${{ matrix.cpack && '--target package' || '' }}
      options: ${{ matrix.linker && format('CMAKE_LINKER_TYPE={0}', matrix.linker) || '' }} ${{ matrix.static && 'BUILD_SHARED_LIBS=OFF' || '' }}

   - name: Install
     if: ${{ ! matrix.cpack }}
     run: sudo cmake --install ${{ steps.cmake.outputs.build-dir }} --config Release --strip

   - name: Install with CPack
     if: ${{ matrix.cpack }}
     working-directory: ${{ steps.cmake.outputs.build-dir }}
     run: sudo apt install -y -q ./pbwt-1.0.0-${{ runner.os }}.deb

   - name: Run program
     run: pbwt -h

   - name: Check man page
     run: man pbwt | col -b

   - name: Prepare for tests
     run: tar -c -f ${{ runner.temp }}/bwt.tar .

   - name: Test missing argument value (-j)
     working-directory: ${{ runner.temp }}
     run: pbwt -j && exit 1 || exit 0

   - name: Test missing argument value (-o)
     working-directory: ${{ runner.temp }}
     run: pbwt -o && exit 1 || exit 0

   - name: Test missing argument value (-p)
     working-directory: ${{ runner.temp }}
     run: pbwt -p && exit 1 || exit 0

   - name: Test unknown argument
     working-directory: ${{ runner.temp }}
     run: pbwt -z && exit 1 || exit 0

   - name: Test input and output file with the same name
     working-directory: ${{ runner.temp }}
     run: pbwt -o bwt.tar bwt.tar && exit 1 || exit 0

   - name: Compression test using FILE
     working-directory: ${{ runner.temp }}
     run: pbwt -p 9 -o bwt-file.tar.bwt bwt.tar

   - name: Compression test using STDIN
     working-directory: ${{ runner.temp }}
     run: cat bwt.tar | pbwt -p 9 -o bwt-stdin.tar.bwt

   - name: Compression test using STDOUT
     working-directory: ${{ runner.temp }}
     run: pbwt -p 9 -v -c bwt.tar > bwt-stdout.tar.bwt

   - name: Decompression test using FILE
     working-directory: ${{ runner.temp }}
     run: pbwt -d -o bwt-file.tar bwt-file.tar.bwt

   - name: Decompression test using STDIN file
     working-directory: ${{ runner.temp }}
     run: pbwt -d -o bwt-stdin.tar bwt-stdin.tar.bwt

   - name: Decompression test using STDOUT file
     working-directory: ${{ runner.temp }}
     run: pbwt -d -o bwt-stdout.tar bwt-stdout.tar.bwt

   - name: Compare decompressed files 1/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-file.tar

   - name: Compare decompressed files 2/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-stdin.tar

   - name: Compare decompressed files 3/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-stdout.tar

 valgrind:
  if: github.event.pull_request.draft == false

  runs-on: ubuntu-latest

  name: Valgrind checks

  steps:
   - name: Pulling project
     uses: actions/checkout@v6

   - name: Setup CMake
     id: cmake
     uses: threeal/cmake-action@v2
     with:
      source-dir: src
      options: CMAKE_BUILD_TYPE=Debug

   - name: Install
     run: sudo cmake --install ${{ steps.cmake.outputs.build-dir }}

   - name: Run program
     run: pbwt -h

   - name: Prepare for tests
     run: tar -c -f ${{ runner.temp }}/bwt.tar .

   - name: Install Valgrind
     run: |
      sudo apt-get update -q
      sudo apt-get install -y -q valgrind

   - name: Memcheck - Compression test
     working-directory: ${{ runner.temp }}
     run: valgrind -q --error-exitcode=1 --leak-check=full --errors-for-leak-kinds=all pbwt -v -p 9 -o bwt-file.tar.bwt bwt.tar

   - name: Memcheck - Decompression test
     working-directory: ${{ runner.temp }}
     run: valgrind -q --error-exitcode=1 --leak-check=full --errors-for-leak-kinds=all pbwt -v -d -o bwt-file.tar bwt-file.tar.bwt

   - name: DRD - Compression test
     working-directory: ${{ runner.temp }}
     run: valgrind -q --error-exitcode=1 --tool=drd --check-stack-var=yes --free-is-write=yes pbwt -v -p 9 -o bwt-file.tar.bwt bwt.tar

   - name: DRD - Decompression test
     working-directory: ${{ runner.temp }}
     run: valgrind -q --error-exitcode=1 --tool=drd --check-stack-var=yes --free-is-write=yes pbwt -v -d -o bwt-file.tar bwt-file.tar.bwt

 asan:
  if: github.event.pull_request.draft == false

  runs-on: ubuntu-latest

  name: ASAN checks

  steps:
   - name: Pulling project
     uses: actions/checkout@v6

   - name: Setup CMake
     id: cmake
     uses: threeal/cmake-action@v2
     with:
      source-dir: src
      options: CMAKE_BUILD_TYPE=Debug USE_ASAN=ON

   - name: Install
     run: sudo cmake --install ${{ steps.cmake.outputs.build-dir }}

   - name: Run program
     run: pbwt -h

   - name: Prepare for tests
     run: tar -c -f ${{ runner.temp }}/bwt.tar .

   - name: Compression test
     working-directory: ${{ runner.temp }}
     run: pbwt -v -p 9 -o bwt-file.tar.bwt bwt.tar

   - name: Decompression test
     working-directory: ${{ runner.temp }}
     run: pbwt -v -d -o bwt-file.tar bwt-file.tar.bwt

 windows:
  if: github.event.pull_request.draft == false

  strategy:
   fail-fast: false
   matrix:
    generator: ['']
    build_type: [Release]
    arch: [Win32, x64]
    toolset: ['', ClangCL]
    linker: [DEFAULT, LLD]
    static: [false, true]
    include:
     - generator: 'MinGW Makefiles'
       compiler: gcc
       static: true
     - generator: 'MinGW Makefiles'
       compiler: gcc
       linker: LLD
     - generator: 'MinGW Makefiles'
       compiler: clang
       static: true
     - generator: 'MinGW Makefiles'
       compiler: clang
       linker: LLD
     - generator: ''
       arch: x64
       build_type: Debug

  runs-on: windows-latest

  name: Windows - ${{ matrix.generator || 'Visual Studio' }} - ${{ matrix.build_type || 'Release' }} - ${{ matrix.compiler || matrix.arch }} - ${{ matrix.static && 'STATIC' || 'SHARED' }} ${{ matrix.linker && format('- {0}', matrix.linker) || '' }} ${{ matrix.toolset && format('- {0}', matrix.toolset) || '' }}

  steps:
   - name: Pulling project
     uses: actions/checkout@v6

   - name: Setup CMake
     id: cmake
     uses: threeal/cmake-action@v2
     with:
      source-dir: src
      generator: ${{ matrix.generator }}
      c-compiler: ${{ matrix.compiler }}
      args: ${{ matrix.arch && format('-A {0}', matrix.arch) || '' }} ${{ matrix.toolset && format('-T {0}', matrix.toolset) || '' }}
      build-args: --config ${{ matrix.build_type || 'Release' }}
      options: ${{ matrix.linker && format('CMAKE_LINKER_TYPE={0}', matrix.linker) || '' }} ${{ matrix.static && 'BUILD_SHARED_LIBS=OFF' || '' }} ${{ matrix.build_type == 'Debug' && 'USE_ASAN=ON' || '' }}

   - name: Install
     run: cmake --install ${{ steps.cmake.outputs.build-dir }} --config ${{ matrix.build_type || 'Release' }} ${{ matrix.build_type == 'Debug' && '' || '--strip' }} --prefix ${{ runner.temp }}\pbwt

   - name: Run program
     working-directory: ${{ runner.temp }}
     run: ./pbwt/bin/pbwt -h

   - name: Prepare for tests
     run: tar -c -f ${{ runner.temp }}\bwt.tar .

   - name: Test missing argument value (-j)
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -j && exit 1 || exit 0

   - name: Test missing argument value (-o)
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -o && exit 1 || exit 0

   - name: Test missing argument value (-p)
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -p && exit 1 || exit 0

   - name: Test unknown argument
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -z && exit 1 || exit 0

   - name: Test input and output file with the same name
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -o bwt.tar bwt.tar && exit 1 || exit 0

   - name: Compression test using FILE
     working-directory: ${{ runner.temp }}
     run: ./pbwt/bin/pbwt -p 9 -o bwt-file.tar.bwt bwt.tar

   - name: Compression test using STDIN
     working-directory: ${{ runner.temp }}
     shell: bash
     run: cat bwt.tar | ./pbwt/bin/pbwt -p 9 -o bwt-stdin.tar.bwt

   - name: Compression test using STDOUT
     working-directory: ${{ runner.temp }}
     shell: bash
     run: ./pbwt/bin/pbwt -p 9 -v -c bwt.tar > bwt-stdout.tar.bwt

   - name: Decompression test using FILE
     working-directory: ${{ runner.temp }}
     run: ./pbwt/bin/pbwt -d -o bwt-file.tar bwt-file.tar.bwt

   - name: Decompression test using STDIN file
     working-directory: ${{ runner.temp }}
     run: ./pbwt/bin/pbwt -d -o bwt-stdin.tar bwt-stdin.tar.bwt

   - name: Decompression test using STDOUT file
     working-directory: ${{ runner.temp }}
     run: ./pbwt/bin/pbwt -d -o bwt-stdout.tar bwt-stdout.tar.bwt

   - name: Compare decompressed files 1/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-file.tar

   - name: Compare decompressed files 2/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-stdin.tar

   - name: Compare decompressed files 3/3
     working-directory: ${{ runner.temp }}
     run: cmp -s bwt.tar bwt-stdout.tar
